<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UniCham</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/UniCham/resources/css/styles.css">
</head>
<body>

    <header class="header-custom text-center">
        <h3 class="mb-0">UniCham - Inicio de Sesión</h3>
    </header>

    <div class="container login-container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">
                        <h4 class="mb-0">Bienvenido</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="index.php?controller=user&method=login" method="post">
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control" placeholder="nombre@correo.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" autocomplete="current-password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Acceder al Sistema</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-custom text-center">
        <p class="mb-0">&copy; 2026 By Villafuerte. UniCham Project.</p>
    </footer>

</body>
</html>
